services:
  db:
    image: mysql:8.4
    container_name: meeting-booking-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-booking_service}
      MYSQL_USER: ${MYSQL_USER:-booking_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booking_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: meeting-booking-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: meeting-booking-backend
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-booking_service}
      DB_USERNAME: ${MYSQL_USER:-booking_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-booking_password}
      QUEUE_CONNECTION: rabbitmq
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_QUEUE: notifications
      RABBITMQ_WORKER: default
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
    volumes:
      - ./backend:/var/www/html
    command: ["/usr/local/bin/start-backend"]

  queue-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: meeting-booking-queue-worker
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-booking_service}
      DB_USERNAME: ${MYSQL_USER:-booking_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-booking_password}
      QUEUE_CONNECTION: rabbitmq
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_QUEUE: notifications
      RABBITMQ_WORKER: default
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
    volumes:
      - ./backend:/var/www/html
    command: ["/usr/local/bin/start-worker"]

  nginx:
    image: nginx:1.27-alpine
    container_name: meeting-booking-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: meeting-booking-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
    command: >
      sh -lc "
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "

volumes:
  mysql_data:
